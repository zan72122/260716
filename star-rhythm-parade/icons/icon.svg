<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#4a3a9e"/>
      <stop offset="60%" stop-color="#241a5e"/>
      <stop offset="100%" stop-color="#140f38"/>
    </radialGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe985"/>
      <stop offset="100%" stop-color="#ffc93d"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- 小さな星 -->
  <g fill="#fff" opacity="0.85">
    <circle cx="34" cy="38" r="2.6"/>
    <circle cx="146" cy="30" r="2"/>
    <circle cx="152" cy="120" r="2.4"/>
    <circle cx="26" cy="128" r="1.8"/>
    <circle cx="120" cy="18" r="1.6"/>
    <circle cx="60" cy="16" r="1.8"/>
  </g>
  <!-- 音符 -->
  <g fill="#7ce8c4">
    <ellipse cx="36" cy="98" rx="7" ry="5.4" transform="rotate(-18 36 98)"/>
    <rect x="41" y="66" width="4" height="31" rx="2"/>
    <path d="M41 66 q12 2 14 12 q-6 -5 -14 -5 z"/>
  </g>
  <g fill="#ff8fb1">
    <ellipse cx="140" cy="86" rx="6" ry="4.6" transform="rotate(-18 140 86)"/>
    <rect x="144.2" y="58" width="3.6" height="27" rx="1.8"/>
    <path d="M144 58 q10 2 12 10 q-5 -4 -12 -4 z"/>
  </g>
  <!-- おおきな星(顔つき) -->
  <g transform="translate(90 96)">
    <path fill="url(#star)" stroke="#2b2350" stroke-width="5" stroke-linejoin="round"
