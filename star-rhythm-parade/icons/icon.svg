    <circle cx="-12" cy="-4" r="4.6" fill="#2b2350"/>
    <circle cx="12" cy="-4" r="4.6" fill="#2b2350"/>
    <circle cx="-10.5" cy="-5.5" r="1.6" fill="#fff"/>
    <circle cx="13.5" cy="-5.5" r="1.6" fill="#fff"/>
    <circle cx="-21" cy="6" r="4.4" fill="#ff9db6" opacity="0.9"/>
    <circle cx="21" cy="6" r="4.4" fill="#ff9db6" opacity="0.9"/>
    <path d="M-7 8 Q0 15 7 8" stroke="#2b2350" stroke-width="3.6" fill="none" stroke-linecap="round"/>
  </g>
