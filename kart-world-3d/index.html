<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4ec5f7">
<title>にじいろカート アイランドGP</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏎️%3C/text%3E%3C/svg%3E">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; position:fixed; background:#4ec5f7;
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Rounded Mplus 1c","M PLUS Rounded 1c",sans-serif;
    touch-action:none; -webkit-user-select:none; user-select:none; }
  #game-canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- 共通UIパーツ ---------- */
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; z-index:20; transition:opacity .4s; }
  .hidden { opacity:0 !important; pointer-events:none !important; }
  .big-btn {
    border:none; cursor:pointer; color:#fff; font-weight:900;
    font-family:inherit; letter-spacing:.08em;
    background:linear-gradient(180deg,#ffd93d 0%,#ff9f1c 55%,#f77f00 100%);
    border-radius:999px; padding:max(3.2vh,18px) max(9vw,44px);
    font-size:clamp(26px, 6.5vw, 46px);
    box-shadow:0 8px 0 #c05f00, 0 14px 24px rgba(0,0,0,.25), inset 0 3px 6px rgba(255,255,255,.6);
    text-shadow:0 2px 0 rgba(160,80,0,.55);
    transition:transform .08s, box-shadow .08s;
  }
  .big-btn:active { transform:translateY(6px); box-shadow:0 2px 0 #c05f00, 0 6px 12px rgba(0,0,0,.25); }

  /* ---------- タイトル ---------- */
  #title-screen { background:linear-gradient(180deg, rgba(30,150,255,.25), rgba(0,60,160,.35)); }
  #logo { text-align:center; margin-bottom:2vh; transform:rotate(-3deg); }
  #logo .l1 { display:block; font-size:clamp(30px,7vw,58px); font-weight:900; color:#fff;
    text-shadow:0 3px 0 #1a6fd4, 0 6px 14px rgba(0,0,0,.35); letter-spacing:.12em; }
  #logo .l2 { display:block; margin-top:.5vh; font-size:clamp(46px,11vw,96px); font-weight:900; letter-spacing:.02em;
    background:linear-gradient(90deg,#ff5a5a,#ffb13d,#ffe93d,#5ad66f,#4db9ff,#b06bff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 4px 0 rgba(255,255,255,.9)) drop-shadow(0 9px 10px rgba(0,40,120,.45)); }
  #char-row { display:flex; gap:clamp(8px,2.4vw,20px); margin:3vh 0 4vh; flex-wrap:wrap; justify-content:center; padding:0 12px; }
  .char-card { width:clamp(74px,19vw,120px); border-radius:22px; border:5px solid rgba(255,255,255,.85);
    background:rgba(255,255,255,.28); padding:8px 4px 10px; text-align:center; cursor:pointer;
    transition:transform .15s, background .15s, border-color .15s; backdrop-filter:blur(3px); }
  .char-card img { width:78%; aspect-ratio:1; border-radius:50%; display:block; margin:0 auto;
    box-shadow:0 4px 10px rgba(0,0,0,.25); background:#fff; }
  .char-card .cname { display:block; margin-top:7px; font-weight:900; color:#fff;
    font-size:clamp(14px,3.4vw,20px); text-shadow:0 2px 3px rgba(0,50,120,.6); }
  .char-card.sel { transform:scale(1.13) rotate(-2deg); background:rgba(255,255,255,.55); border-color:#ffe93d;
    box-shadow:0 0 0 4px rgba(255,233,61,.5), 0 10px 24px rgba(0,0,0,.3); }
  #title-hint { margin-top:3.4vh; color:#fff; font-weight:800; font-size:clamp(13px,3vw,18px);
    text-shadow:0 2px 4px rgba(0,50,120,.6); opacity:.95; }
  /* 高さが低い横画面ではロゴとカードを小さく */
  @media (max-height: 480px) {
    #logo .l1 { font-size:clamp(18px,3.6vh,30px); }
    #logo .l2 { font-size:clamp(30px,9vh,60px); }
    #char-row { margin:1.2vh 0 1.6vh; }
    .char-card { width:clamp(64px,17vh,96px); border-width:4px; }
    .big-btn { padding:1.6vh 8vw; font-size:clamp(20px,7vh,34px); }
    #title-hint { margin-top:1.6vh; }
  }

  /* ---------- カウントダウン ---------- */
  #countdown { z-index:22; pointer-events:none; background:transparent; }
  #count-num { font-size:clamp(120px,34vw,300px); font-weight:900; color:#fff;
    text-shadow:0 6px 0 #ff8b1f, 0 14px 30px rgba(0,0,0,.4);
    transform:scale(0); }
  #count-num.pop { animation:countPop .95s ease-out; }
  @keyframes countPop {
    0% { transform:scale(0); opacity:0; }
    18% { transform:scale(1.25); opacity:1; }
    30% { transform:scale(1); }
    80% { transform:scale(1); opacity:1; }
    100% { transform:scale(1.6); opacity:0; }
  }

  /* ---------- HUD ---------- */
  #hud { position:absolute; inset:0; z-index:10; pointer-events:none;
    padding:calc(env(safe-area-inset-top) + 10px) calc(env(safe-area-inset-right) + 12px)
            calc(env(safe-area-inset-bottom) + 10px) calc(env(safe-area-inset-left) + 12px); }
  .hud-chip { position:absolute; display:flex; align-items:center; gap:8px;
    background:rgba(10,40,90,.45); border:3px solid rgba(255,255,255,.85); border-radius:999px;
    padding:6px 16px; color:#fff; font-weight:900; backdrop-filter:blur(3px);
    text-shadow:0 2px 3px rgba(0,0,0,.4); }
  #hud-lap { top:calc(env(safe-area-inset-top) + 10px); left:calc(env(safe-area-inset-left) + 12px);
    font-size:clamp(17px,4.2vw,26px); }
  #hud-coin { top:calc(env(safe-area-inset-top) + 10px); left:50%; transform:translateX(-50%);
    font-size:clamp(17px,4.2vw,26px); color:#ffe36b; }
  #hud-rank { top:calc(env(safe-area-inset-top) + 10px); right:calc(env(safe-area-inset-right) + 12px);
    font-size:clamp(24px,6vw,40px); padding:4px 20px;
    background:linear-gradient(180deg,rgba(255,120,40,.85),rgba(230,60,30,.85)); }
  #hud-rank .rank-suffix { font-size:.55em; }
  #hud-rank.first { background:linear-gradient(180deg,rgba(255,200,40,.95),rgba(255,140,0,.95)); }
  /* 縦画面ではコインを2段目に */
  @media (max-aspect-ratio: 4/5) {
    #hud-coin { top:calc(env(safe-area-inset-top) + 62px); left:calc(env(safe-area-inset-left) + 12px); transform:none; }
  }

  /* ---------- 操作ボタン ---------- */
  .steer-btn { position:absolute; bottom:calc(env(safe-area-inset-bottom) + 3.2vh);
    width:clamp(88px,22vw,150px); height:clamp(88px,22vw,150px); border-radius:50%;
    border:5px solid rgba(255,255,255,.9); pointer-events:auto; cursor:pointer;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.5), rgba(70,140,255,.55) 60%, rgba(30,80,200,.6));
    box-shadow:0 6px 16px rgba(0,0,0,.3), inset 0 3px 8px rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center; transition:transform .07s; }
  .steer-btn svg { width:56%; height:56%; filter:drop-shadow(0 3px 2px rgba(0,0,0,.35)); }
  .steer-btn.pressed { transform:scale(.9); background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.7), rgba(255,190,60,.75) 60%, rgba(255,140,0,.8)); }
  #btn-left { left:calc(env(safe-area-inset-left) + 3.4vw); }
  #btn-right { right:calc(env(safe-area-inset-right) + 3.4vw); }

  #btn-item { position:absolute; bottom:calc(env(safe-area-inset-bottom) + 16vh); right:calc(env(safe-area-inset-right) + 3.6vw);
    width:clamp(76px,18vw,124px); height:clamp(76px,18vw,124px); border-radius:32%;
    border:5px solid #fff; pointer-events:auto; cursor:pointer; display:none;
    align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 28%, #ffffff, #ffe36b 45%, #ff9f1c);
    box-shadow:0 0 0 6px rgba(255,220,80,.45), 0 8px 18px rgba(0,0,0,.35);
    animation:itemPulse 1s infinite; }
  #btn-item img { width:64%; height:64%; }
  @keyframes itemPulse { 0%,100% { transform:scale(1);} 50% { transform:scale(1.09);} }

  /* ---------- お知らせテロップ ---------- */
  #toast { position:absolute; top:24%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:14;
    font-size:clamp(30px,9vw,64px); font-weight:900; color:#fff; pointer-events:none; white-space:nowrap;
    text-shadow:0 4px 0 #ff7b1f, 0 9px 18px rgba(0,0,0,.4); }
  #toast.show { animation:toastPop 1.35s ease-out; }
  @keyframes toastPop {
    0% { transform:translate(-50%,-50%) scale(0); opacity:0; }
    15% { transform:translate(-50%,-50%) scale(1.15); opacity:1; }
    28% { transform:translate(-50%,-50%) scale(1); }
    78% { transform:translate(-50%,-50%) scale(1); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1.4); opacity:0; }
  }

  /* ---------- ゴール ---------- */
  #finish-screen { background:transparent; z-index:24; }
  #finish-inner { display:flex; flex-direction:column; align-items:center; gap:2.4vh;
    background:rgba(10,40,100,.4); border-radius:36px; padding:5vh 9vw; backdrop-filter:blur(5px);
    border:5px solid rgba(255,255,255,.7); }
  #finish-title { font-size:clamp(44px,12vw,100px); font-weight:900; color:#ffe93d;
    text-shadow:0 4px 0 #ff7b1f, 0 10px 20px rgba(0,0,0,.45); transform:rotate(-3deg); }
  #finish-rank { font-size:clamp(34px,9vw,72px); font-weight:900; color:#fff;
    text-shadow:0 3px 0 #1a6fd4, 0 8px 16px rgba(0,0,0,.4); }
  #finish-msg { font-size:clamp(18px,4.6vw,30px); font-weight:900; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.5); }

  /* ---------- ローディング ---------- */
  #loading { background:linear-gradient(180deg,#59c7ff,#2f8fe8); z-index:40; }
  #loading .spin { width:70px; height:70px; border-radius:50%;
    border:9px solid rgba(255,255,255,.35); border-top-color:#fff; animation:spin 1s linear infinite; }
  #loading p { margin-top:20px; color:#fff; font-weight:900; font-size:20px; letter-spacing:.1em; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
<script type="importmap">
  { "imports": { "three": "./lib/three.module.min.js" } }
</script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud" class="hidden">
    <div class="hud-chip" id="hud-lap"><span id="lap-flag">🏁</span><span id="lap-text">1/3 しゅうめ</span></div>
    <div class="hud-chip" id="hud-coin"><span>🪙</span><span id="coin-text">0</span></div>
    <div class="hud-chip" id="hud-rank"><span id="rank-num">1</span><span class="rank-suffix">い</span></div>
    <div class="steer-btn" id="btn-left" aria-label="ひだり">
      <svg viewBox="0 0 24 24"><path d="M15.5 4 7 12l8.5 8" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="steer-btn" id="btn-right" aria-label="みぎ">
      <svg viewBox="0 0 24 24"><path d="M8.5 4 17 12l-8.5 8" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div id="btn-item"><img id="item-icon" alt="アイテム"></div>
  </div>

  <div id="toast"></div>

  <div id="countdown" class="screen hidden"><div id="count-num"></div></div>

  <div id="finish-screen" class="screen hidden">
    <div id="finish-inner">
      <div id="finish-title">ゴール！</div>
      <div id="finish-rank"></div>
      <div id="finish-msg"></div>
      <button class="big-btn" id="btn-again">もういちど！</button>
    </div>
  </div>

  <div id="title-screen" class="screen hidden">
    <div id="logo">
      <span class="l1">アイランド グランプリ</span>
      <span class="l2">にじいろカート</span>
    </div>
    <div id="char-row"></div>
    <button class="big-btn" id="btn-start">スタート！</button>
    <div id="title-hint">← → ボタン か がめんを なぞって うんてんするよ</div>
  </div>

  <div id="loading" class="screen"><div class="spin"></div><p>じゅんびちゅう…</p></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
